name: build

on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit tests
        run: go test -mod vendor -race ./...

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      daptin:
        image: daptin/daptin:v0.12.13
        ports:
          - 6336:8080
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build -mod vendor -o daptin-cli .
      - name: Wait for Daptin
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:6336/api/world >/dev/null && exit 0
            sleep 2
          done
          exit 1
      - name: E2E tests
        run: DAPTIN_ENDPOINT=http://localhost:6336 bash scripts/e2e.sh

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GR_TOKEN }}
